<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>视频播放</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .player {
      width: min(100vw, 1000px);
      padding: 16px;
      box-sizing: border-box;
    }

    video {
      width: 100%;
      height: auto;
      display: block;
      background: black;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="player">
    <video controls playsinline>
      <source src="https://media.multmatrix.com/NBC_Nightly_News_Full_Episode_-_April_12.withsub.mp4" type="video/mp4" />
      <track
        src="https://media.multmatrix.com/NBC_Nightly_News_Full_Episode_-_April_12_241.0_19-32.zh.vtt"
        kind="subtitles"
        srclang="zh"
        label="中文"
        default
      />
      你的浏览器不支持 video 标签。
    </video>
  </div>
</body>
</html>
