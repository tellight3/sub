<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>视频播放</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .player {
      width: min(100vw, 1000px);
      padding: 16px;
      box-sizing: border-box;
    }

    video {
      width: 100%;
      height: auto;
      display: block;
      background: black;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="player">
    <video id="video" controls playsinline crossorigin="anonymous">
      <source src="https://media.multmatrix.com/NBC_Nightly_News_Full_Episode_-_April_12.withsub.mp4" type="video/mp4" />
      <track
        id="subtitleTrack"
        src="https://media.multmatrix.com/NBC_Nightly_News_Full_Episode_-_April_12_241.0_19-32.zh.vtt"
        kind="subtitles"
        srclang="zh"
        label="中文"
        default
      />
      你的浏览器不支持 video 标签。
    </video>
  </div>

  <script>
    const video = document.getElementById("video");

    video.addEventListener("loadedmetadata", () => {
      for (let i = 0; i < video.textTracks.length; i++) {
        video.textTracks[i].mode = "hidden";
      }

      if (video.textTracks.length > 0) {
        video.textTracks[0].mode = "showing";
        console.log("字幕已强制开启");
      } else {
        console.log("没有检测到字幕轨道");
      }
    });
  </script>
</body>
</html>
